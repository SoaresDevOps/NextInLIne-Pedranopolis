<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado</title>

    <!-- Howler (som confiável em TV) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <!-- Socket -->
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            background-color: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 90%;
            margin: auto;
            margin-top: 10%;
            text-align: center;
        }

        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 5px;
        }

        #displaySala, #displaySenha, #displayDoutor {
            font-size: 32px;
            color: #007bff;
            margin-bottom: 20px;
            font-weight: bold;
        }

        #meuVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
        }
    </style>
</head>

<body>

    <!-- 🎥 Vídeo de fundo -->
    <video id="meuVideo" autoplay muted>
        <source src="{{ url_for('static', filename='videos/video1.mp4') }}" type="video/mp4">
    </video>

    <!-- 📋 Painel -->
    <div class="container" id="painelSenha" style="display:none;">
        <h1>Sala:</h1>
        <div id="displaySala">-</div>

        <h1>Paciente:</h1>
        <div id="displaySenha">-</div>

        <h1>Profissional:</h1>
        <div id="displayDoutor">-</div>
    </div>

    <script>
        const socket = io();

        const video = document.getElementById('meuVideo');
        const painel = document.getElementById('painelSenha');

        // 🔇 FORÇA vídeo SEM som (IMPORTANTE PRA TV)
        video.muted = true;
        video.volume = 0;

        // 🔊 SOM COM HOWLER (funciona em TV)
        const som = new Howl({
            src: ["{{ url_for('static', filename='audio/som.mp3') }}"],
            volume: 1.0,
            html5: true
        });

        let tempoExibicao;

        // 🎬 Lista de vídeos
        const listaVideos = [
            "{{ url_for('static', filename='videos/video1.mp4') }}",
            "{{ url_for('static', filename='videos/video2.mp4') }}",
            "{{ url_for('static', filename='videos/video3.mp4') }}",
            "{{ url_for('static', filename='videos/video4.mp4') }}"
        ];

        let indice = 0;

        // 🔁 troca automática de vídeo
        video.addEventListener('ended', () => {
            indice++;
            if (indice >= listaVideos.length) indice = 0;

            video.src = listaVideos[indice];
            video.play().catch(() => {});
        });

        // 📡 RECEBE CHAMADA (TUDO JUNTO)
        socket.on('receive_chamada', (data) => {

            // Atualiza dados
            document.getElementById('displaySala').textContent = data.sala || '-';
            document.getElementById('displaySenha').textContent = data.senha || '-';
            document.getElementById('displayDoutor').textContent = data.doutor || '-';

            // Para vídeo
            video.pause();
            video.style.display = "none";

            // Mostra painel
            painel.style.display = "block";

            // 🔊 toca som
            som.play();

            // limpa tempo anterior
            clearTimeout(tempoExibicao);

            // volta após 10 segundos
            tempoExibicao = setTimeout(() => {
                painel.style.display = "none";
                video.style.display = "block";
                video.play().catch(() => {});
            }, 10000);
        });
    </script>

</body>
</html>
