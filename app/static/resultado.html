<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel</title>

    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>

    <style>
        body {
            margin: 0;
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 100%;
        }

        h1 {
            font-size: 40px;
            margin: 10px 0;
        }

        .valor {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Sala:</h1>
    <div id="sala" class="valor">-</div>

    <h1>Paciente:</h1>
    <div id="senha" class="valor">-</div>

    <h1>Profissional:</h1>
    <div id="doutor" class="valor">-</div>
</div>

<!-- 🔊 ÁUDIO SIMPLES -->
<audio id="audio" preload="auto">
    <source src="{{ url_for('static', filename='audio/som.mp3') }}" type="audio/mpeg">
</audio>

<script>
    const socket = io();

    const audio = document.getElementById('audio');

    // 🔥 força carregar áudio
    audio.load();

    socket.on('receive_chamada', (data) => {

        // Atualiza tela
        document.getElementById('sala').innerText = data.sala || "-";
        document.getElementById('senha').innerText = data.senha || "-";
        document.getElementById('doutor').innerText = data.doutor || "-";

        // 🔊 TOCA SOM (forma mais simples e confiável)
        try {
            audio.currentTime = 0;
            audio.play();
        } catch (e) {
            console.log("Erro no áudio:", e);
        }
    });

    // 🔓 LIBERA ÁUDIO (caso TV bloqueie)
    document.body.addEventListener('click', () => {
        audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
        }).catch(() => {});
    }, { once: true });

</script>

</body>
</html>
